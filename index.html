<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Opt out of browser auto dark theme (honored earlier than the CSS
         color-scheme property); we render our own fixed light colors. -->
    <meta name="color-scheme" content="only light" />
    <title>simpsons team agents</title>
    <!-- Preload the self-hosted display font so the title paints fast. -->
    <link
      rel="preload"
      href="assets/fonts/luckiest-guy-subset.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Intro curtain: a white screen of 6 clouds in two leaves. At t=0 they
         fully cover the viewport; the left leaf slides left, the right leaf
         slides right (each cloud at a different speed), revealing the title.
         Decorative, never blocks clicks. -->
    <div class="intro" aria-hidden="true">
      <!-- LEFT leaf (exits left) -->
      <svg class="cur cL1" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
      <svg class="cur cL2" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
      <svg class="cur cL3" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
      <!-- RIGHT leaf (exits right) -->
      <svg class="cur cR1" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
      <svg class="cur cR2" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
      <svg class="cur cR3" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
    </div>

    <!-- Three reusable cloud shape variants, defined once and stamped with <use>. -->
    <svg
      width="0"
      height="0"
      aria-hidden="true"
      focusable="false"
      style="position: absolute"
    >
      <defs>
        <!-- Variant A: classic wide, 5 bumps -->
        <g id="st-cloud-a" fill="#ffffff">
          <ellipse cx="100" cy="76" rx="86" ry="22" />
          <circle cx="30" cy="70" r="20" />
          <circle cx="52" cy="60" r="28" />
          <circle cx="92" cy="46" r="38" />
          <circle cx="134" cy="56" r="30" />
          <circle cx="164" cy="68" r="22" />
        </g>
        <!-- Variant B: rounder / taller, fewer big bumps -->
        <g id="st-cloud-b" fill="#ffffff">
          <ellipse cx="100" cy="78" rx="80" ry="20" />
          <circle cx="24" cy="72" r="18" />
          <circle cx="48" cy="58" r="34" />
          <circle cx="100" cy="42" r="46" />
          <circle cx="150" cy="58" r="32" />
          <circle cx="176" cy="72" r="18" />
        </g>
        <!-- Variant C: flatter, chunky 3-lump -->
        <g id="st-cloud-c" fill="#ffffff">
          <ellipse cx="100" cy="80" rx="88" ry="18" />
          <circle cx="55" cy="62" r="30" />
          <circle cx="105" cy="54" r="36" />
          <circle cx="150" cy="64" r="26" />
        </g>

        <!-- Caged industrial status lantern (reused by every agent card via <use>).
             The bulb uses currentColor, so each card colors it via `color: var(--status)`. -->
        <radialGradient id="lanternHi" cx="0.42" cy="0.36" r="0.6">
          <stop offset="0" stop-color="#fff" stop-opacity="0.95" />
          <stop offset="0.5" stop-color="#fff" stop-opacity="0" />
        </radialGradient>
        <symbol id="agent-lantern" viewBox="0 0 60 78">
          <rect x="24" y="4" width="12" height="7" rx="2" fill="#3a597f" stroke="#1c3450" />
          <path d="M18 12 h24 l-4 7 h-16 z" fill="#3a597f" stroke="#1c3450" />
          <circle cx="30" cy="40" r="17" fill="currentColor" />
          <circle cx="30" cy="40" r="17" fill="url(#lanternHi)" />
          <circle cx="30" cy="40" r="17" fill="none" stroke="#6a5628" stroke-width="1.6" />
          <line x1="13" y1="34" x2="47" y2="34" stroke="#6a5628" stroke-width="1.4" />
          <line x1="13" y1="46" x2="47" y2="46" stroke="#6a5628" stroke-width="1.4" />
          <line x1="20" y1="25" x2="20" y2="55" stroke="#6a5628" stroke-width="1.4" />
          <line x1="30" y1="23" x2="30" y2="57" stroke="#6a5628" stroke-width="1.4" />
          <line x1="40" y1="25" x2="40" y2="55" stroke="#6a5628" stroke-width="1.4" />
          <path d="M22 57 h16 l-4 6 h-8 z" fill="#3a597f" stroke="#1c3450" />
        </symbol>
      </defs>
    </svg>

    <!-- Background clouds: seamless right-to-left marquee. Two identical sets in
         a 200vw track; the sky is never empty and the wrap is invisible. -->
    <div class="sky" aria-hidden="true">
      <div class="drift-track">
        <div class="bg-set">
          <svg class="bg-cloud" style="--x: 3%; --y: 14%; --w: 22vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 20%; --y: 56%; --w: 16vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 37%; --y: 8%; --w: 13vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
          <svg class="bg-cloud" style="--x: 52%; --y: 41%; --w: 26vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 72%; --y: 22%; --w: 15vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 86%; --y: 63%; --w: 19vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
        </div>
        <div class="bg-set bg-set--2">
          <svg class="bg-cloud" style="--x: 3%; --y: 14%; --w: 22vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 20%; --y: 56%; --w: 16vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 37%; --y: 8%; --w: 13vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
          <svg class="bg-cloud" style="--x: 52%; --y: 41%; --w: 26vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 72%; --y: 22%; --w: 15vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 86%; --y: 63%; --w: 19vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
        </div>
      </div>
    </div>

    <!-- Header reserves the title's vertical space (the title itself is a fixed,
         direct child of <body> below, so it is never clipped by a transformed
         ancestor). -->
    <header class="site-header"></header>

    <!-- Title: MUST be a direct child of <body> (no transformed/filtered
         ancestor) so the position:fixed centering is clipped only by the
         viewport. Styled by title-color-spec; this only adds the intro motion. -->
    <h1 class="site-title">simpsons team agents</h1>

    <!-- Team cards (v1 skeleton): 5 grey placeholder cards, each with a reserved
         status "lantern" slot above it. Avatars/names/roles/status come later. -->
    <section class="team" aria-labelledby="team-heading">
      <h2 id="team-heading" class="team__title">Team</h2>

      <!-- Each card shows the emotion frame for its status (assets/emotions/<agent>-<status>.webp).
           DEMO/PLACEHOLDER statuses (different per card so all 5 poses are visible);
           live status wiring comes later. data-status drives the lantern glow, dot
           and status-word color. -->
      <ul class="team__grid">
        <li class="agent-card" data-agent="march" data-status="working">
          <span class="agent-card__lantern" aria-hidden="true">
            <svg viewBox="0 0 60 78" width="100%" height="100%"><use href="#agent-lantern" /></svg>
          </span>
          <div class="agent-card__frame">
            <div class="agent-card__panel">
              <img class="agent-card__avatar" src="assets/emotions/march-working.webp" alt="" />
            </div>
            <p class="agent-card__name">March</p>
            <p class="agent-card__role">Orchestrator</p>
            <p class="agent-card__status">
              <span class="agent-card__dot" aria-hidden="true"></span>
              <span class="agent-card__status-text">Working</span>
            </p>
          </div>
        </li>
        <li class="agent-card" data-agent="homer" data-status="resting">
          <span class="agent-card__lantern" aria-hidden="true">
            <svg viewBox="0 0 60 78" width="100%" height="100%"><use href="#agent-lantern" /></svg>
          </span>
          <div class="agent-card__frame">
            <div class="agent-card__panel">
              <img class="agent-card__avatar" src="assets/emotions/homer-resting.webp" alt="" />
            </div>
            <p class="agent-card__name">Homer</p>
            <p class="agent-card__role">Developer</p>
            <p class="agent-card__status">
              <span class="agent-card__dot" aria-hidden="true"></span>
              <span class="agent-card__status-text">Resting</span>
            </p>
          </div>
        </li>
        <li class="agent-card" data-agent="bart" data-status="question">
          <span class="agent-card__lantern" aria-hidden="true">
            <svg viewBox="0 0 60 78" width="100%" height="100%"><use href="#agent-lantern" /></svg>
          </span>
          <div class="agent-card__frame">
            <div class="agent-card__panel">
              <img class="agent-card__avatar" src="assets/emotions/bart-question.webp" alt="" />
            </div>
            <p class="agent-card__name">Bart</p>
            <p class="agent-card__role">Reviewer</p>
            <p class="agent-card__status">
              <span class="agent-card__dot" aria-hidden="true"></span>
              <span class="agent-card__status-text">Question</span>
            </p>
          </div>
        </li>
        <li class="agent-card" data-agent="lisa" data-status="idle">
          <span class="agent-card__lantern" aria-hidden="true">
            <svg viewBox="0 0 60 78" width="100%" height="100%"><use href="#agent-lantern" /></svg>
          </span>
          <div class="agent-card__frame">
            <div class="agent-card__panel">
              <img class="agent-card__avatar" src="assets/emotions/lisa-idle.webp" alt="" />
            </div>
            <p class="agent-card__name">Lisa</p>
            <p class="agent-card__role">Reviewer</p>
            <p class="agent-card__status">
              <span class="agent-card__dot" aria-hidden="true"></span>
              <span class="agent-card__status-text">Idle</span>
            </p>
          </div>
        </li>
        <li class="agent-card" data-agent="maggie" data-status="down">
          <span class="agent-card__lantern" aria-hidden="true">
            <svg viewBox="0 0 60 78" width="100%" height="100%"><use href="#agent-lantern" /></svg>
          </span>
          <div class="agent-card__frame">
            <div class="agent-card__panel">
              <img class="agent-card__avatar" src="assets/emotions/maggie-down.webp" alt="" />
            </div>
            <p class="agent-card__name">Maggie</p>
            <p class="agent-card__role">Designer</p>
            <p class="agent-card__status">
              <span class="agent-card__dot" aria-hidden="true"></span>
              <span class="agent-card__status-text">Down</span>
            </p>
          </div>
        </li>
      </ul>
    </section>

    <!-- Live status polling (experiment branch): updates each card's pose,
         lantern, dot and word from status.json without a reload. -->
    <script src="live-status.js" defer></script>
  </body>
</html>
