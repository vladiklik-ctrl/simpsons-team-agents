<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Opt out of browser auto dark theme (honored earlier than the CSS
         color-scheme property); we render our own fixed light colors. -->
    <meta name="color-scheme" content="only light" />
    <title>simpsons team agents</title>
    <!-- Preload the self-hosted display font so the title paints fast. -->
    <link
      rel="preload"
      href="assets/fonts/luckiest-guy-subset.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1 class="site-title">simpsons team agents</h1>
    </header>
  </body>
</html>
