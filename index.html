<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Opt out of browser auto dark theme (honored earlier than the CSS
         color-scheme property); we render our own fixed light colors. -->
    <meta name="color-scheme" content="only light" />
    <title>simpsons team agents</title>
    <!-- Preload the self-hosted display font so the title paints fast. -->
    <link
      rel="preload"
      href="assets/fonts/luckiest-guy-subset.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Intro curtain: a white screen of 6 clouds in two leaves. At t=0 they
         fully cover the viewport; the left leaf slides left, the right leaf
         slides right (each cloud at a different speed), revealing the title.
         Decorative, never blocks clicks. -->
    <div class="intro" aria-hidden="true">
      <!-- LEFT leaf (exits left) -->
      <svg class="cur cL1" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
      <svg class="cur cL2" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
      <svg class="cur cL3" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
      <!-- RIGHT leaf (exits right) -->
      <svg class="cur cR1" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
      <svg class="cur cR2" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
      <svg class="cur cR3" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
    </div>

    <!-- Three reusable cloud shape variants, defined once and stamped with <use>. -->
    <svg
      width="0"
      height="0"
      aria-hidden="true"
      focusable="false"
      style="position: absolute"
    >
      <defs>
        <!-- Variant A: classic wide, 5 bumps -->
        <g id="st-cloud-a" fill="#ffffff">
          <ellipse cx="100" cy="76" rx="86" ry="22" />
          <circle cx="30" cy="70" r="20" />
          <circle cx="52" cy="60" r="28" />
          <circle cx="92" cy="46" r="38" />
          <circle cx="134" cy="56" r="30" />
          <circle cx="164" cy="68" r="22" />
        </g>
        <!-- Variant B: rounder / taller, fewer big bumps -->
        <g id="st-cloud-b" fill="#ffffff">
          <ellipse cx="100" cy="78" rx="80" ry="20" />
          <circle cx="24" cy="72" r="18" />
          <circle cx="48" cy="58" r="34" />
          <circle cx="100" cy="42" r="46" />
          <circle cx="150" cy="58" r="32" />
          <circle cx="176" cy="72" r="18" />
        </g>
        <!-- Variant C: flatter, chunky 3-lump -->
        <g id="st-cloud-c" fill="#ffffff">
          <ellipse cx="100" cy="80" rx="88" ry="18" />
          <circle cx="55" cy="62" r="30" />
          <circle cx="105" cy="54" r="36" />
          <circle cx="150" cy="64" r="26" />
        </g>
      </defs>
    </svg>

    <!-- Background clouds: seamless right-to-left marquee. Two identical sets in
         a 200vw track; the sky is never empty and the wrap is invisible. -->
    <div class="sky" aria-hidden="true">
      <div class="drift-track">
        <div class="bg-set">
          <svg class="bg-cloud" style="--x: 3%; --y: 14%; --w: 22vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 20%; --y: 56%; --w: 16vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 37%; --y: 8%; --w: 13vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
          <svg class="bg-cloud" style="--x: 52%; --y: 41%; --w: 26vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 72%; --y: 22%; --w: 15vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 86%; --y: 63%; --w: 19vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
        </div>
        <div class="bg-set bg-set--2">
          <svg class="bg-cloud" style="--x: 3%; --y: 14%; --w: 22vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 20%; --y: 56%; --w: 16vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 37%; --y: 8%; --w: 13vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
          <svg class="bg-cloud" style="--x: 52%; --y: 41%; --w: 26vw" viewBox="0 0 200 100"><use href="#st-cloud-a" /></svg>
          <svg class="bg-cloud" style="--x: 72%; --y: 22%; --w: 15vw" viewBox="0 0 200 100"><use href="#st-cloud-b" /></svg>
          <svg class="bg-cloud" style="--x: 86%; --y: 63%; --w: 19vw" viewBox="0 0 200 100"><use href="#st-cloud-c" /></svg>
        </div>
      </div>
    </div>

    <!-- Header reserves the title's vertical space (the title itself is a fixed,
         direct child of <body> below, so it is never clipped by a transformed
         ancestor). -->
    <header class="site-header"></header>

    <!-- Title: MUST be a direct child of <body> (no transformed/filtered
         ancestor) so the position:fixed centering is clipped only by the
         viewport. Styled by title-color-spec; this only adds the intro motion. -->
    <h1 class="site-title">simpsons team agents</h1>
  </body>
</html>
